<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Incident Management Agent</title>
  <link rel="stylesheet" href="static/css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <span class="brand-icon">🛡️</span> Incident Agent
      </div>
      <div class="auth-subtitle">AI-Driven Operational Diagnostics</div>
    </div>
    
    <div id="alert-container"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Work Email</label>
        <input class="input-control" type="email" id="email" required placeholder="name@company.com">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="input-control" type="password" id="password" required placeholder="••••••••">
      </div>
      <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 10px;">Sign In</button>
    </form>
    
    <div style="text-align: center; margin-top: 24px; font-size: 14px;">
      <span style="color: var(--text-secondary);">New to the platform? </span>
      <a href="register.html" style="color: var(--accent); font-weight: 500; text-decoration: none;">Create Account</a>
    </div>
  </div>

  <script src="static/js/app.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem("token", data.access_token);
          localStorage.setItem("user", JSON.stringify(data.user));
          window.location.href = "index.html";
        } else {
          showAlert("alert-container", data.detail || "Authentication failed. Check credentials.", "error");
        }
      } catch (err) {
        showAlert("alert-container", "Network connection failure. Try again.", "error");
      }
    });
  </script>
</body>
</html>
