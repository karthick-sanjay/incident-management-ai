services:
  - type: web
    name: incident-management-agent
    env: python
    buildCommand: pip install -r requirements.txt && python backend/train_models.py
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: incident-agent-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MOCK_AI_FALLBACK
        value: "true"
      - key: LLM_PROVIDER
        value: groq

databases:
  - name: incident-agent-db
    plan: free
